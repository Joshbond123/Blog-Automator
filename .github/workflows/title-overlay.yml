name: Title Overlay Renderer

on:
  repository_dispatch:
    types: [title_overlay]

jobs:
  overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert -version

      - name: Render title overlay and upload to Catbox
        env:
          SOURCE_IMAGE_URL: ${{ github.event.client_payload.sourceImageUrl }}
          TITLE_TEXT: ${{ github.event.client_payload.title }}
          CATBOX_HASH: ${{ github.event.client_payload.catboxHash }}
        run: |
          node scripts/render-title-overlay.mjs

      - name: Upload overlay result artifact
        uses: actions/upload-artifact@v4
        with:
          name: title-overlay-result
          path: result.json
          if-no-files-found: error
